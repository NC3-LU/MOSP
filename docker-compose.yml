version: '3'
services:

  db:
    image: postgres:latest
    hostname: db
    container_name: mosp_db
    restart: always
    environment:
      - POSTGRES_USER=mosp
      - POSTGRES_PASSWORD=mosp
      - POSTGRES_DB=mosp
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  mosp:
    build: .
    container_name: mosp
    working_dir: /mosp
    tty: true
    environment:
        - MOSP_CONFIG=docker.py
        - HOST=0.0.0.0
        - PORT=5000
        # Required: set SECRET_KEY and SECURITY_PASSWORD_SALT via a .env file
        # or by passing them as environment variables before running docker-compose.
        # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
        # Example .env file:
        #   SECRET_KEY=<output of above command>
        #   SECURITY_PASSWORD_SALT=<output of above command again>
    command: "./entrypoint.sh"
    volumes:
      - .:/mosp:rw
      - mosp/static
    ports:
        - "5000:5000"
    expose:
        - "5000"
    depends_on:
      - db

volumes:
  postgres_data:
